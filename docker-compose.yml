services:
  app:
    image: ghcr.io/blixten85/product-describer:latest
    container_name: product-describer
    restart: unless-stopped
    ports:
      - "5050:5050"
    environment:
      PROVIDER_CONFIG_MASTER_KEY: ${PROVIDER_CONFIG_MASTER_KEY:?Set PROVIDER_CONFIG_MASTER_KEY in .env — generate one with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"}
      GITHUB_ERROR_REPORT_TOKEN: ${GITHUB_ERROR_REPORT_TOKEN:-}
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - config:/app/config

  sync:
    image: ghcr.io/blixten85/product-describer:latest
    container_name: product-describer-sync
    restart: unless-stopped
    profiles: [sync]
    command: ["python", "main.py", "sync", "--watch"]
    environment:
      PROVIDER_CONFIG_MASTER_KEY: ${PROVIDER_CONFIG_MASTER_KEY:?Set PROVIDER_CONFIG_MASTER_KEY in .env — generate one with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"}
      SCRAPER_URL: ${SCRAPER_URL:-http://scraper:8000}
      SCRAPER_API_KEY: ${SCRAPER_API_KEY:-}
      SCRAPER_API_KEY_FILE: ${SCRAPER_API_KEY_FILE:-}
      GITHUB_ERROR_REPORT_TOKEN: ${GITHUB_ERROR_REPORT_TOKEN:-}
    volumes:
      - config:/app/config
    networks:
      - default
      - scraper_net

volumes:
  uploads:
  outputs:
  config:

networks:
  default:
  scraper_net:
    external: true
    name: ${SCRAPER_NETWORK:-scraper_default}
