services:
  app:
    build: .
    container_name: product-describer
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - config:/app/config

  sync:
    build: .
    container_name: product-describer-sync
    restart: unless-stopped
    profiles: [sync]
    command: ["python", "main.py", "sync", "--watch"]
    environment:
      SCRAPER_URL: ${SCRAPER_URL:-http://scraper:8000}
      SCRAPER_API_KEY: ${SCRAPER_API_KEY:-}
      SCRAPER_API_KEY_FILE: ${SCRAPER_API_KEY_FILE:-}
    volumes:
      - config:/app/config
    networks:
      - default
      - scraper_net

volumes:
  uploads:
  outputs:
  config:

networks:
  default:
  scraper_net:
    external: true
    name: ${SCRAPER_NETWORK:-scraper_default}
