name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          find . -path './.git' -prune -o -name 'requirements.txt' -not -path './requirements.txt' -print0 | xargs -0 -r -n1 python -m pip install -r
          if [ -f pyproject.toml ]; then python -m pip install -e '.[test]' || python -m pip install -e .; fi
      - run: python -m compileall .
      - name: Run tests
        run: |
          if [ -d tests ]; then python -m pip install pytest && python -m pytest; else echo "No tests directory found"; fi
  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: python
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/blixten85/product-describer:latest
            ghcr.io/blixten85/product-describer:sha-${{ steps.sha.outputs.short }}
