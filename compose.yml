services:
  product-describer:
    container_name: product-describer
    image: ghcr.io/blixten85/product-describer:latest
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_URL=http://product-describer-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    volumes:
      - ${DOCKER}/product-describer:/app/uploads
      - ${DOCKER}/product-describer:/app/outputs
    security_opt:
      - no-new-privileges:true
    depends_on:
      - product-describer-ollama
    restart: unless-stopped

  product-describer-ollama:
    container_name: product-describer-ollama
    image: ollama/ollama        # CPU (standard)
    # image: ollama/ollama:rocm # AMD ROCm — avkommentera för GPU-försök (se nedan)
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # AMD Barcelo iGPU (Ryzen 5 7430U)
    # OBS: Barcelo är en integrerad GPU som delar RAM med CPU:n.
    # ROCm stöder inte officiellt iGPU, men HSA_OVERRIDE_GFX_VERSION=9.0.0
    # kan fungera som workaround. Byt även image till ollama:rocm ovan.
    #
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=9.0.0
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video
    #   - render

volumes:
  ollama_data:
