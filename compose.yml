services:
  product-describer:
    container_name: product-describer
    image: ghcr.io/blixten85/product-describer:latest
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_URL=http://product-describer-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      # Set SYNC_ENABLED=true to also run the scraper sync worker as a
      # background thread inside this container. Requires SCRAPER_URL.
      - SYNC_ENABLED=${SYNC_ENABLED:-false}
      - SCRAPER_URL=${SCRAPER_URL:-}
      - SCRAPER_API_KEY_FILE=/credentials/api_key
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300}
    volumes:
      - ${DOCKER}/product-describer:/app/uploads
      - ${DOCKER}/product-describer:/app/outputs
      # Mount the scraper credentials read-only so the sync worker can read
      # the API key. Safe to keep mounted even when SYNC_ENABLED is false.
      - ${DOCKER}/scraper/credentials:/credentials:ro
    security_opt:
      - no-new-privileges:true
    depends_on:
      - product-describer-ollama
    networks:
      - default
      # Joins the scraper's docker network so SCRAPER_URL can use the
      # internal hostname (http://scraper:8000) without going through
      # the public reverse proxy. Override SCRAPER_NETWORK in .env if
      # the scraper compose stack uses a non-default network name.
      - scraper
    restart: unless-stopped

  product-describer-ollama:
    container_name: product-describer-ollama
    image: ollama/ollama        # CPU (standard)
    # image: ollama/ollama:rocm # AMD ROCm — avkommentera för GPU-försök (se nedan)
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # AMD Barcelo iGPU (Ryzen 5 7430U)
    # OBS: Barcelo är en integrerad GPU som delar RAM med CPU:n.
    # ROCm stöder inte officiellt iGPU, men HSA_OVERRIDE_GFX_VERSION=9.0.0
    # kan fungera som workaround. Byt även image till ollama:rocm ovan.
    #
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=9.0.0
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video
    #   - render

networks:
  scraper:
    name: ${SCRAPER_NETWORK:-scraper_default}
    external: true

volumes:
  ollama_data:
