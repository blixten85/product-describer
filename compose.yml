services:
  app:
    container_name: product-describer
    build: .
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    volumes:
      - ${DOCKER}/product-describer:/app/uploads
      - ${DOCKER}/product-describer:/app/outputs
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    container_name: product-describer-ollama
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Avkommentera för GPU-stöd (kräver nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
