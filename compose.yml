services:
  product-describer:
    container_name: product-describer
    image: ghcr.io/blixten85/product-describer:latest
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_URL=http://product-describer-ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
    volumes:
      - ${DOCKER}/product-describer:/app/uploads
      - ${DOCKER}/product-describer:/app/outputs
    depends_on:
      - product-describer-ollama
    restart: unless-stopped

  product-describer-ollama:
    container_name: product-describer-ollama
    image: ollama/ollama        # CPU
    # image: ollama/ollama:rocm # AMD GPU — byt hit och avkommentera devices nedan
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # AMD GPU (ROCm) — kräver ROCm-drivrutiner på hosten:
    # devices:
    #   - /dev/kfd
    #   - /dev/dri
    # group_add:
    #   - video
    #   - render
    #
    # NVIDIA — kräver nvidia-container-toolkit:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama_data:
