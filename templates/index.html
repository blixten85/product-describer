<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Describer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script>
        (function () {
            const s = localStorage.getItem('theme');
            const p = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-bs-theme', s || p);
        })();
    </script>
    <style>
        body { background: var(--bs-body-bg); }
        .navbar { border-bottom: 1px solid var(--bs-border-color); background: var(--bs-body-bg) !important; }
        .drop-zone {
            border: 2px dashed var(--bs-border-color);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }
        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #3b82f6;
            background: rgba(59,130,246,.06);
        }
        .drop-zone .bi { font-size: 2.5rem; color: var(--bs-secondary-color); }
        .job-row td { vertical-align: middle; }
        .status-badge { font-size: .75rem; }
        .progress { height: 6px; }
        .theme-toggle {
            background: none;
            border: 1px solid var(--bs-border-color);
            border-radius: 8px;
            padding: 5px 10px;
            color: var(--bs-body-color);
            cursor: pointer;
        }
        .theme-toggle:hover { background: var(--bs-secondary-bg); }
        .cost-hint { font-size: .8rem; color: var(--bs-secondary-color); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top mb-4">
    <div class="container" style="max-width:860px;">
        <span class="navbar-brand fw-semibold">
            <i class="bi bi-stars text-primary me-2"></i>Product Describer
        </span>
        <button class="theme-toggle ms-auto" onclick="toggleTheme()">
            <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
        </button>
    </div>
</nav>

<div class="container py-2" style="max-width:860px;">

    <!-- Upload card -->
    <div class="card mb-4">
        <div class="card-body p-4">
            <h5 class="card-title mb-3">Ladda upp produktlista</h5>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <i class="bi bi-file-earmark-spreadsheet d-block mb-3"></i>
                <div class="fw-medium mb-1">Dra och släpp CSV-fil här</div>
                <div class="text-muted" style="font-size:.875rem;">eller klicka för att välja fil</div>
                <div class="mt-2 cost-hint">Kolumner: Site, Product, Price (SEK), Link</div>
            </div>
            <input type="file" id="fileInput" accept=".csv" class="d-none" onchange="handleFile(this.files[0])">

            <div id="fileInfo" class="mt-3 d-none">
                <div class="d-flex align-items-center gap-3">
                    <i class="bi bi-file-earmark-text fs-4 text-primary"></i>
                    <div class="flex-grow-1">
                        <div class="fw-medium" id="fileName"></div>
                        <div class="cost-hint" id="fileRows"></div>
                    </div>
                    <button class="btn btn-primary" id="submitBtn" onclick="submitBatch()">
                        <i class="bi bi-send me-1"></i> Generera beskrivningar
                    </button>
                </div>
                <div id="costEstimate" class="mt-2 cost-hint"></div>
            </div>

            <div id="uploadProgress" class="mt-3 d-none">
                <div class="d-flex align-items-center gap-2 text-muted">
                    <div class="spinner-border spinner-border-sm" role="status"></div>
                    <span id="uploadStatus">Skickar batch till Claude...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Jobs -->
    <div class="card" id="jobsCard" style="display:none!important">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-list-task me-1"></i> Jobb</span>
            <button class="btn btn-sm btn-outline-secondary" onclick="loadJobs()">
                <i class="bi bi-arrow-clockwise"></i>
            </button>
        </div>
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Fil</th>
                        <th>Rader</th>
                        <th>Status</th>
                        <th>Framsteg</th>
                        <th>Skapat</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="jobsTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="toastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
let selectedFile = null;
let pollInterval = null;

// ── Theme ──────────────────────────────────────────────────────────────────
function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-bs-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
}
function updateThemeIcon() {
    const dark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
    document.getElementById('themeIcon').className = dark ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
}
updateThemeIcon();

// ── Drag-and-drop ──────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
});

function handleFile(file) {
    if (!file || !file.name.toLowerCase().endsWith('.csv')) {
        showToast('Välj en CSV-fil', 'danger');
        return;
    }
    selectedFile = file;

    // Quick row count estimate from file size
    const estimatedRows = Math.round(file.size / 80);
    const costSEK = Math.round(estimatedRows * 0.0003 * 11); // ~$0.0003/row → SEK

    document.getElementById('fileName').textContent = file.name;
    document.getElementById('fileRows').textContent = `~${estimatedRows.toLocaleString('sv-SE')} rader · ${(file.size/1024).toFixed(0)} KB`;
    document.getElementById('costEstimate').textContent = `Ungefärlig kostnad: ${costSEK} kr (Claude Haiku via Batches API, 50% rabatt)`;
    document.getElementById('fileInfo').classList.remove('d-none');
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function submitBatch() {
    if (!selectedFile) return;
    document.getElementById('fileInfo').classList.add('d-none');
    document.getElementById('uploadProgress').classList.remove('d-none');

    const form = new FormData();
    form.append('file', selectedFile);

    try {
        const r = await fetch('/api/upload', { method: 'POST', body: form });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Uppladdning misslyckades');
        showToast(`Batch skickad — ${data.total.toLocaleString('sv-SE')} produkter`, 'success');
        selectedFile = null;
        document.getElementById('fileInfo').classList.add('d-none');
        document.getElementById('uploadProgress').classList.add('d-none');
        document.getElementById('fileInput').value = '';
        loadJobs();
        startPolling();
    } catch (e) {
        showToast(e.message, 'danger');
        document.getElementById('uploadProgress').classList.add('d-none');
        document.getElementById('fileInfo').classList.remove('d-none');
    }
}

// ── Jobs ───────────────────────────────────────────────────────────────────
async function loadJobs() {
    const data = await fetch('/api/jobs').then(r => r.json()).catch(() => []);
    const tbody = document.getElementById('jobsTable');
    const card = document.getElementById('jobsCard');

    if (!data.length) {
        card.style.removeProperty('display');
        card.style.display = 'none';
        return;
    }

    card.style.removeProperty('display');

    tbody.innerHTML = data.map(job => {
        const pct = job.total ? Math.round(job.succeeded / job.total * 100) : 0;
        const badge = statusBadge(job.status);
        const created = new Date(job.created_at).toLocaleString('sv-SE', {
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });
        const dlBtn = job.status === 'done'
            ? `<a class="btn btn-sm btn-success" href="/api/jobs/${job.id}/download">
                 <i class="bi bi-download me-1"></i>Ladda ner
               </a>`
            : job.status === 'error'
            ? `<span class="text-danger small">${escHtml(job.error || 'Fel')}</span>`
            : `<button class="btn btn-sm btn-outline-secondary" onclick="refreshJob('${job.id}')">
                 <i class="bi bi-arrow-clockwise"></i>
               </button>`;

        return `<tr class="job-row">
            <td class="fw-medium">${escHtml(job.filename)}</td>
            <td class="text-muted">${job.total.toLocaleString('sv-SE')}</td>
            <td>${badge}</td>
            <td style="min-width:100px;">
                <div class="progress mb-1">
                    <div class="progress-bar ${job.status === 'done' ? 'bg-success' : ''}"
                         style="width:${pct}%"></div>
                </div>
                <div class="cost-hint">${job.succeeded.toLocaleString('sv-SE')} / ${job.total.toLocaleString('sv-SE')}</div>
            </td>
            <td class="text-muted" style="font-size:.8rem;">${created}</td>
            <td>${dlBtn}</td>
        </tr>`;
    }).join('');
}

function statusBadge(status) {
    const map = {
        processing: ['bg-primary', 'Bearbetar'],
        done:       ['bg-success', 'Klar'],
        error:      ['bg-danger',  'Fel'],
    };
    const [cls, label] = map[status] || ['bg-secondary', status];
    return `<span class="badge ${cls} status-badge">${label}</span>`;
}

async function refreshJob(jobId) {
    await fetch(`/api/jobs/${jobId}/refresh`).catch(() => {});
    loadJobs();
}

// ── Polling ────────────────────────────────────────────────────────────────
function startPolling() {
    if (pollInterval) return;
    pollInterval = setInterval(async () => {
        const jobs = await fetch('/api/jobs').then(r => r.json()).catch(() => []);
        const active = jobs.filter(j => j.status === 'processing');
        if (!active.length) {
            clearInterval(pollInterval);
            pollInterval = null;
            loadJobs();
            return;
        }
        // Refresh each active job
        await Promise.all(active.map(j =>
            fetch(`/api/jobs/${j.id}/refresh`).catch(() => {})
        ));
        loadJobs();
    }, 15000);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function escHtml(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = `toast align-items-center text-white bg-${type} border-0`;
    el.setAttribute('role', 'alert');
    el.innerHTML = `<div class="d-flex">
        <div class="toast-body">${message}</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>`;
    container.appendChild(el);
    const t = new bootstrap.Toast(el, { delay: 4000 });
    t.show();
    el.addEventListener('hidden.bs.toast', () => el.remove());
}

// ── Init ───────────────────────────────────────────────────────────────────
loadJobs().then(() => {
    const jobs = document.querySelectorAll('.job-row');
    // start polling if there are processing jobs
    fetch('/api/jobs').then(r => r.json()).then(data => {
        if (data.some(j => j.status === 'processing')) startPolling();
    }).catch(() => {});
});
</script>
</body>
</html>
